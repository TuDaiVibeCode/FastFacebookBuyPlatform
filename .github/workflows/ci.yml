name: CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend CI
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ../../requirements.txt

      - name: Run API tests
        run: |
          python -m pytest

  deploy:
    name: Deploy Backend stack to Linux Docker
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - backend
      - frontend
      - mobile
      - landing
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to remote Docker host
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            export BRANCH="${{ github.ref_name }}"
            if [ -z "${DEPLOY_PATH}" ]; then
              echo "Missing DEPLOY_PATH secret"
              exit 1
            fi
            cd "${DEPLOY_PATH}"
            if [ ! -d .git ]; then
              echo "DEPLOY_PATH is not a git repository"
              exit 1
            fi
            git fetch origin
            git checkout "${BRANCH}"
            git reset --hard "origin/${BRANCH}"
            if [ ! -f backend/.env ]; then
              echo "backend/.env missing"
              echo "Create backend/.env from backend/.env.example before deploy"
              exit 1
            fi
            docker compose -f backend/infra/docker/docker-compose.yml --env-file backend/.env down --remove-orphans
            docker compose -f backend/infra/docker/docker-compose.yml --env-file backend/.env up -d --build
            docker compose -f backend/infra/docker/docker-compose.yml --env-file backend/.env ps

  frontend:
    name: Frontend CI
    timeout-minutes: 15
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  mobile:
    name: Mobile CI
    timeout-minutes: 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Export web bundle
        run: npm run export:web

  landing:
    name: Landing Page CI
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate landing artifacts
        run: |
          test -f landing/README.md || (echo "landing README missing" && exit 1)
          test -f landing/.env.example || (echo ".env.example missing in landing" && exit 1)
          grep -q "LANDING_PORT" landing/.env.example || (echo "LANDING_PORT missing in landing/.env.example" && exit 1)

      - name: Build landing project when package exists
        run: |
          if [ -f landing/package.json ]; then
            npm ci --prefix landing
            npm run lint --prefix landing
            npm run build --prefix landing
          else
            echo "landing is currently a static/documentation entry point; no build toolchain detected."
          fi
