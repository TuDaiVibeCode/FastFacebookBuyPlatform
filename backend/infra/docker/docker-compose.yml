name: ${COMPOSE_PROJECT_NAME:-deal-radar}

services:
  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    image: ${API_IMAGE:-deal-radar-api:local}
    ports:
      - "${API_HTTP_PORT:-18000}:${API_PORT:-8000}"
    env_file:
      - ../../.env
    environment:
      API_NAME: ${API_NAME:-Deal Radar API}
      API_VERSION: ${API_VERSION:-0.1.0}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      EXACT_CACHE_TTL_SECONDS: ${EXACT_CACHE_TTL_SECONDS:-86400}
      SEMANTIC_CACHE_THRESHOLD: ${SEMANTIC_CACHE_THRESHOLD:-0.90}
      USE_MOCK_LLM: ${USE_MOCK_LLM:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql://dealradar:dealradar@postgres:5432/deal_radar}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-change-me-now}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-1440}
      STRICT_SOURCE_POLICY: ${STRICT_SOURCE_POLICY:-false}
      SAMPLE_DATA_DIR: ${SAMPLE_DATA_DIR:-/workspace/backend/packages/sample-data}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CHROMA_URL: ${CHROMA_URL:-http://chromadb:8000}
    command:
      - sh
      - -c
      - exec uvicorn app.main:app --host "$${API_HOST:-0.0.0.0}" --port "$${API_PORT:-8000}"
    depends_on:
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os, urllib.request; port = os.getenv('API_PORT', '8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/api/v1/health', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  chromadb:
    image: ${CHROMA_IMAGE:-chromadb/chroma:0.5.23}
    ports:
      - "${CHROMA_HOST_PORT:-18001}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: ${CHROMA_PERSIST_DIRECTORY:-/chroma/chroma}
      ANONYMIZED_TELEMETRY: ${CHROMA_ANONYMIZED_TELEMETRY:-FALSE}
    volumes:
      - chroma-data:${CHROMA_PERSIST_DIRECTORY:-/chroma/chroma}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dealradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dealradar}
      POSTGRES_DB: ${POSTGRES_DB:-deal_radar}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-dealradar}", "-d", "${POSTGRES_DB:-deal_radar}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis-data:
  chroma-data:
  postgres-data:
